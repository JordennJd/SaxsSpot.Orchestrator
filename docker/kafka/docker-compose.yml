services:
  kafka:
    image: 'apache/kafka:3.7.0'
    container_name: kafka
    hostname: kafka
    ports:
      - '9092:9092'
      - '29092:29092'
      - '9093:9093'
      - '9999:9999'
    environment:
      # Базовые настройки Kafka
      KAFKA_BROKER_ID: 0
      KAFKA_LOG_DIRS: /tmp/kafka-logs
      
      # Kraft Configuration
      KAFKA_KRAFT_CLUSTER_ID: 'MzI5N2ViNTUtN2U2Zi0wMDAwLThiOWItNDU0ZTRkODI4MWU5'
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '0@kafka:9093'
      
      # Listeners Configuration
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:29092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://localhost:9092,INTERNAL://kafka:29092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      
      # Topic Settings
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      
  kafka-setup:
    image: 'apache/kafka:3.7.0'
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: 'kafka:29092'
      TOPICS: 'scattering.parallelepiped.calculate:1:1, scattering.parallelepiped.calculate.result:1:1'
    command: >
      bash -c "
        echo 'Waiting for Kafka to be ready...';
        until /opt/kafka/bin/kafka-topics.sh --bootstrap-server $${KAFKA_BROKER} --list; do sleep 1; done;
        echo 'Creating topics...';
        IFS=',' read -ra TOPIC_ARRAY <<< \"$${TOPICS}\";
        for topic in \"$${TOPIC_ARRAY[@]}\"; do
          IFS=':' read -ra TOPIC_CONFIG <<< \"$${topic}\";
          /opt/kafka/bin/kafka-topics.sh --bootstrap-server $${KAFKA_BROKER} \\
            --create \\
            --topic $${TOPIC_CONFIG[0]} \\
            --partitions $${TOPIC_CONFIG[1]} \\
            --replication-factor $${TOPIC_CONFIG[2]} \\
            --if-not-exists;
          echo \"Created topic $${TOPIC_CONFIG[0]} with $${TOPIC_CONFIG[1]} partitions and $${TOPIC_CONFIG[2]} replicas\";
        done;
        echo 'All topics created';
        sleep infinity;
      "

  kafka-ui:
    image: 'provectuslabs/kafka-ui:latest'
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - '8085:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: 'local'
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: 'kafka:29092'
      KAFKA_CLUSTERS_0_ZOOKEEPER: 'zookeeper:2181'
      DYNAMIC_CONFIG_ENABLED: 'true'