services:
  db:
    image: postgres:latest
    container_name: db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saxs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Web UI
    environment:
      MINIO_ROOT_USER: s3user
      MINIO_ROOT_PASSWORD: s3secretkey
    command: server /data --console-address ":9001"
  
  db-init:
    image: postgres:latest
    container_name: db_initializer
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    entrypoint: >
      bash -c "until pg_isready -h db -U postgres; do sleep 1; done &&
               psql -h db -U postgres -d saxs -c 'CREATE SCHEMA IF NOT EXISTS saxs;'"
  
  liquibase:
    build:
      context: ../../SaxsSpot.Orchestrator.Database
      dockerfile: Dockerfile
    container_name: liquibase_migrator
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully