services:
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - nanosystem-service
      - orchestrator-service
      - tracker-rest-service
    restart: unless-stopped
    
  web-ui:
    image: jordenndev/saxsspot-web-ui
    ports:
      - "1000:80"
    volumes:
      - ./front.env:/app/.env:ro

    environment:
      ENV_FILE: docker
    depends_on:
      - tracker-grpc-service
      - chart-service
      - orchestrator-service
      - nanosystem-service

  nanosystem-db:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saxs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "54321:5432"
    volumes:
      - nanosystem-db-data:/var/lib/postgresql/data

  orchestrator-db:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saxs
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "54322:5432"
    volumes:
      - orchestrator-db-data:/var/lib/postgresql/data

  tracker-db:
    image: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saxs

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d saxs" ]
      interval: 5s
      timeout: 5s
      retries: 5
  
  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      MINIO_ROOT_USER: s3user
      MINIO_ROOT_PASSWORD: s3secretkey
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
  
  db-init:
    image: postgres:latest
    container_name: db-init
    depends_on:
      nanosystem-db:
        condition: service_healthy
      orchestrator-db:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    entrypoint: >
      bash -c "until pg_isready -h orchestrator-db -U postgres; do sleep 1; done &&
               psql -h orchestrator-db -U postgres -d saxs -c 'CREATE SCHEMA IF NOT EXISTS saxs';
               until pg_isready -h nanosystem-db -U postgres; do sleep 1; done &&
               psql -h nanosystem-db -U postgres -d saxs -c 'CREATE SCHEMA IF NOT EXISTS saxs;'"
  
  kafka:
    image: 'apache/kafka:3.7.0'
    container_name: kafka
    ports:
      - '9092:9092'
      - '9093:9093'
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: 'broker,controller'
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: '0@kafka:9093'

      KAFKA_CFG_LISTENERS: 'BROKER://:9092,BROKER_INTERNAL://:29092,CONTROLLER://:9093'
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: 'BROKER:PLAINTEXT,BROKER_INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_CFG_ADVERTISED_LISTENERS: 'BROKER://kafka:9092,BROKER_INTERNAL://kafka:29092'
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: 'BROKER_INTERNAL'
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'

      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_CFG_NUM_PARTITIONS: '3'
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: '1'

      KAFKA_JMX_PORT: 9999
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "kafka:29092" ]
      interval: 10s
      timeout: 5s
      retries: 3
  kafka-setup:
    image: 'apache/kafka:3.7.0'
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: 'kafka:29092'
      TOPICS: 'scattering.parallelepiped.calculate:1:1, scattering.parallelepiped.calculate.result:1:1, run-generation-queue:1:1'
    command: >
      bash -c "
        echo 'Waiting for Kafka to be ready...';
        until kafka-topics.sh --bootstrap-server $${KAFKA_BROKER} --list; do sleep 1; done;
        echo 'Creating topics...';
        IFS=',' read -ra TOPIC_ARRAY <<< \"$${TOPICS}\";
        for topic in \"$${TOPIC_ARRAY[@]}\"; do
          IFS=':' read -ra TOPIC_CONFIG <<< \"$${topic}\";
          kafka-topics.sh --bootstrap-server $${KAFKA_BROKER} \\
            --create \\
            --topic $${TOPIC_CONFIG[0]} \\
            --partitions $${TOPIC_CONFIG[1]} \\
            --replication-factor $${TOPIC_CONFIG[2]} \\
            --if-not-exists;
          echo \"Created topic $${TOPIC_CONFIG[0]} with $${TOPIC_CONFIG[1]} partitions and $${TOPIC_CONFIG[2]} replicas\";
        done;
        echo 'All topics created';
      "

  kafka-ui:
    image: 'provectuslabs/kafka-ui:latest'
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - '8085:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: 'local'
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: 'kafka:29092'
      KAFKA_CLUSTERS_0_ZOOKEEPER: 'zookeeper:2181'
      DYNAMIC_CONFIG_ENABLED: 'true'
      
  
  liquibase-nanosystem:
    image: jordenndev/saxsspot-liquibase-nanosystem
    depends_on:
      nanosystem-db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
  
  liquibase-orchestrator:
    image: jordenndev/saxsspot-liquibase-orchestrator
    depends_on:
      orchestrator-db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  tracker-migrate:
    image: jordenndev/saxsspot-tracker-migrator:latest
    depends_on:
      tracker-db:
        condition: service_healthy
    environment:
      DB_URL: "postgres://postgres:postgres@tracker-db:5432/saxs?sslmode=disable"
      MIGRATIONS_PATH: "migrations"

  redis:
    image: redis:7-alpine
    container_name: redis
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  tracker-grpc-service: # 50051
    image: jordenndev/saxsspot-tracker-grpc-service
    environment:
      APP_ENV: Docker
    depends_on:
      - redis
      - tracker-db
      - tracker-migrate

  tracker-rest-service: # 8080
    image: jordenndev/saxsspot-tracker-rest-service
    environment:
      CORS__1: http://localhost:1000
      APP_ENV: Docker
    depends_on:
      - redis
      - tracker-db
      - tracker-migrate

  nanosystem-service:
    image: jordenndev/saxsspot-nanosystem-service
    environment:
      Cors__AllowedOrigins__2: http://localhost:1000
      APP_ENV: Docker
    depends_on:
      - liquibase-nanosystem
      - tracker-grpc-service

  orchestrator-service:
    image: jordenndev/saxsspot-orchestrator-service
    environment:
      Cors__AllowedOrigins__2: http://localhost:1000
      APP_ENV: Docker
    depends_on:
      - liquibase-orchestrator
      - kafka-setup
      - tracker-grpc-service

  scattering-calculation-service:
    image: jordenndev/saxsspot-scattering-calculation-service
    environment:
      APP_ENV: Docker
    depends_on:
      - kafka-setup
      - nanosystem-service
  
  chart-service:
    image: jordenndev/saxsspot-chart-service

volumes:
  orchestrator-db-data:
  nanosystem-db-data:
  minio-data:
  kafka-data:

  